name: Release

# Dispara em tags de versão:
#   vX.Y.Z  -> release estável  (tags: X.Y.Z, X.Y, latest)
#   bX.Y.Z  -> release beta      (tags: X.Y.Z-beta, beta)
#
# Arquitetura do pipeline (sem QEMU):
#   meta          -> resolve tag/canal/imagens
#   build-amd64   -> runner x86 nativo; Trivy (gate CRITICAL) + push por digest
#   build-arm64   -> runner ARM nativo; push por digest  (em PARALELO com amd64)
#   merge         -> monta o manifesto multi-arch (GHCR + Docker Hub), assina
#                    com cosign keyless e cria o GitHub Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'b[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a publicar (vX.Y.Z ou bX.Y.Z)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Resolve tag, canal e nomes de imagem (sem tag) para os demais jobs
  # ---------------------------------------------------------------------------
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.m.outputs.tag }}
      channel: ${{ steps.m.outputs.channel }}
      version: ${{ steps.m.outputs.version }}
      prerelease: ${{ steps.m.outputs.prerelease }}
      images: ${{ steps.m.outputs.images }}             # nomes sem tag, separados por vírgula
      tag_suffixes: ${{ steps.m.outputs.tag_suffixes }} # sufixos, separados por vírgula
    steps:
      - name: Resolver tag e canal
        id: m
        env:
          DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          case "$TAG" in
            v[0-9]*) CHANNEL=stable ;;
            b[0-9]*) CHANNEL=beta ;;
            *) echo "::error::Tag '$TAG' não segue vX.Y.Z nem bX.Y.Z"; exit 1 ;;
          esac
          VERSION="${TAG#?}"
          GHCR_IMG="$(echo "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"

          if [ "$CHANNEL" = stable ]; then
            SUFFIXES="${VERSION},${VERSION%.*},latest"
            PRERELEASE=false
          else
            SUFFIXES="${VERSION}-beta,beta"
            PRERELEASE=true
          fi

          IMAGES="$GHCR_IMG"
          if [ -n "${DOCKERHUB_REPO:-}" ]; then
            IMAGES="${IMAGES},docker.io/${DOCKERHUB_REPO}"
          fi

          {
            echo "tag=$TAG"
            echo "channel=$CHANNEL"
            echo "version=$VERSION"
            echo "prerelease=$PRERELEASE"
            echo "images=$IMAGES"
            echo "tag_suffixes=$SUFFIXES"
          } >> "$GITHUB_OUTPUT"
          echo "Canal=$CHANNEL Versão=$VERSION"
          echo "Imagens: $IMAGES"
          echo "Sufixos de tag: $SUFFIXES"

  # ---------------------------------------------------------------------------
  # amd64 nativo: scan + gate CRITICAL, depois push por digest
  # ---------------------------------------------------------------------------
  build-amd64:
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      packages: write
      security-events: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login no Docker Hub
        if: vars.DOCKERHUB_REPO != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build amd64 (load) para scan
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: scan-target:${{ needs.meta.outputs.version }}
          build-args: |
            IMAGE_VERSION=${{ needs.meta.outputs.version }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

      - name: Trivy (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scan-target:${{ needs.meta.outputs.version }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
      - name: Trivy (gate CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scan-target:${{ needs.meta.outputs.version }}
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Push amd64 por digest
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          build-args: |
            IMAGE_VERSION=${{ needs.meta.outputs.version }}
          outputs: |
            type=image,"name=${{ needs.meta.outputs.images }}",push-by-digest=true,name-canonical=true,push=true
          provenance: false
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  # ---------------------------------------------------------------------------
  # arm64 NATIVO (sem QEMU): push por digest — roda em paralelo com amd64
  # ---------------------------------------------------------------------------
  build-arm64:
    needs: meta
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login no Docker Hub
        if: vars.DOCKERHUB_REPO != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push arm64 por digest
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          build-args: |
            IMAGE_VERSION=${{ needs.meta.outputs.version }}
          outputs: |
            type=image,"name=${{ needs.meta.outputs.images }}",push-by-digest=true,name-canonical=true,push=true
          provenance: false
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  # ---------------------------------------------------------------------------
  # Monta o manifesto multi-arch em cada registry, assina (cosign) e faz release
  # ---------------------------------------------------------------------------
  merge:
    needs: [meta, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write          # criar GitHub Release
      packages: write          # imagetools (manifesto)
      id-token: write          # OIDC para cosign keyless
    steps:
      - uses: docker/setup-buildx-action@v3
      - name: Instalar cosign
        uses: sigstore/cosign-installer@v3.8.1
      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login no Docker Hub
        if: vars.DOCKERHUB_REPO != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Criar manifesto multi-arch e assinar (cada registry)
        env:
          IMAGES: ${{ needs.meta.outputs.images }}
          SUFFIXES: ${{ needs.meta.outputs.tag_suffixes }}
          AMD64_DIGEST: ${{ needs.build-amd64.outputs.digest }}
          ARM64_DIGEST: ${{ needs.build-arm64.outputs.digest }}
        run: |
          set -euo pipefail
          for img in ${IMAGES//,/ }; do
            tagargs=()
            for s in ${SUFFIXES//,/ }; do tagargs+=(-t "${img}:${s}"); done
            echo "::group::Manifesto $img"
            docker buildx imagetools create "${tagargs[@]}" \
              "${img}@${AMD64_DIGEST}" "${img}@${ARM64_DIGEST}"
            primary="${SUFFIXES%%,*}"
            index_digest="$(docker buildx imagetools inspect "${img}:${primary}" --format '{{.Manifest.Digest}}')"
            echo "Assinando ${img}@${index_digest}"
            cosign sign --yes "${img}@${index_digest}"
            echo "::endgroup::"
          done

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          generate_release_notes: true
          body: |
            Canal: **${{ needs.meta.outputs.channel }}**

            Imagens (multi-arch amd64+arm64, assinadas com cosign), em cada registry:
            ```
            ${{ needs.meta.outputs.images }}
            ```
            Tags: `${{ needs.meta.outputs.tag_suffixes }}`
